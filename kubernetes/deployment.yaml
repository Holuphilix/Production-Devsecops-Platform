apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-devsecops-deployment
  namespace: devsecops-platform
spec:
  replicas: 2

  selector:
    matchLabels:
      app: production-devsecops-platform

  template:
    metadata:
      labels:
        app: production-devsecops-platform

    spec:
      containers:
      - name: production-devsecops-container

        image: production-devsecops-platform:v1

        imagePullPolicy: Never

        ports:
        - containerPort: 3000
