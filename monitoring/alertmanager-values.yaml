alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: 'slack-notifications'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url: 'YOUR-SLACK-WEBHOOK-URL'
            channel: '#devsecops-alerts'
            send_resolved: true
            title: '[DevSecOps Platform Alert]'
            text: |
              Alert: {{ .CommonLabels.alertname }}

      - name: 'null'